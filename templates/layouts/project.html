{@io.quarkiverse.roq.frontmatter.runtime.model.NormalPage page}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="{page.description}">
        <meta name="author" content="\{page.data.author}">
        <title>{page.title} · {site.title}</title>
        {#seo page site /}
        {#rss site /}
        
        <link href="https://static.jboss.org/theme/css/bootstrap-community/2.3.1.1/bootstrap-community.min.css" rel="stylesheet" media="screen">
        <link rel="stylesheet" type="text/css" href="{site.url('/stylesheets/code.css')}">
        <script type="text/javascript" src="{site.url('/javascripts/highlight.pack.js')}"></script>
        <script type="text/javascript">hljs.initHighlightingOnLoad();</script>

        <link rel="shortcut icon" href="{site.url('images/undertow_icon_16px.png')}">
        <style>
            @media (min-width: 651px) {
                .banner { background-image: url({site.url('/images/undertow_banner.png')}); height: 110px;  }
            }
            @media (max-width: 650px) {
                .banner { width: 200px; margin: 0px auto; }
            }
        </style>

        <script src="https://static.jboss.org/theme/js/libs/jquery/jquery-1.9.1.min.js"></script>
    </head>
    <body>
        <div class="container" id="content">
            <div class="dropup">
                <a id="tab" class="tabnav-closed" href="https://www.redhat.com">Red Hat</a>
            </div>

            <div class="banner"></div>

            <div class="navbar navbar-inverse" id="navbar-fix">
                <div class="navbar-inner">
                    <div class="container">
                        <a class="btn btn-navbar" data-toggle="collapse" data-target=".nav-collapse">
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                        </a>
                        <div class="nav-collapse collapse">
                            <ul class="nav">
                                <li class="{page.url.path.equals("/") ? 'active' : ''}">
                                    <a href="{site.url}">Home</a>
                                </li>
                                <li class="{page.url.path.startsWith('/blog') ? 'active' : ''}">
                                    <a href="{site.url('/blog')}">Blog</a>
                                </li>
                                <li class="{page.url.path.startsWith('/downloads') ? 'active' : ''}">
                                    <a href="{site.url('/downloads.html')}">Download</a>
                                </li>
                                <li class="{page.url.path.startsWith('/documentation.html') ? 'active' : ''}">
                                    <a href="{site.url('/documentation.html')}">Documentation</a>
                                </li>
                                <li class="{page.url.path.startsWith('/get-involved') ? 'active' : ''}">
                                    <a href="{site.url('/get-involved.html')}">Get Involved</a>
                                </li>
                                <li class="divider"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            {#insert /}

            <div id="companyfooter-placeholder"></div>
        </div>
        <div class="container" id="companyfooter">
            <div class="redhatlogo">
                <div id="logospacer"></div>
                <a href="https://www.redhat.com/">
                    <img src="https://static.jboss.org/theme/images/common/redhat_logo.png">
                </a>
            </div>
        </div>

        <script>
            (function(i,s,o,g,r,a,m)\{i['GoogleAnalyticsObject']=r;i[r]=i[r]||function()\{
            (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
            m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
            })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
            ga('create', 'UA-61374382-1', 'auto');
            ga('send', 'pageview');
        </script>
    </body>
</html>
