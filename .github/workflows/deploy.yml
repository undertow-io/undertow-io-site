name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Build docs for version 2.0.0
        run: |
          git clone --depth 1 --branch 2.0 https://github.com/undertow-io/undertow-docs.git /tmp/docs-2.0.0
          cd /tmp/docs-2.0.0
          mvn clean package -DskipTests
          mkdir -p $GITHUB_WORKSPACE/static/undertow-docs
          cp -r target/generated-docs $GITHUB_WORKSPACE/static/undertow-docs/undertow-docs-2.0.0
          cd $GITHUB_WORKSPACE/static/undertow-docs
          zip -r undertow-docs-2.0.0.zip undertow-docs-2.0.0

      - name: Build docs for version 1.4.0
        run: |
          git clone --depth 1 --branch 1.2.0 https://github.com/undertow-io/undertow-docs.git /tmp/docs-1.4.0
          cd /tmp/docs-1.4.0
          mvn clean package -DskipTests
          mkdir -p $GITHUB_WORKSPACE/static/undertow-docs
          cp -r target/generated-docs $GITHUB_WORKSPACE/static/undertow-docs/undertow-docs-1.4.0
          cd $GITHUB_WORKSPACE/static/undertow-docs
          zip -r undertow-docs-1.4.0.zip undertow-docs-1.4.0

      - name: Build docs for version 1.3.0
        run: |
          git clone --depth 1 --branch 1.3.0 https://github.com/undertow-io/undertow-docs.git /tmp/docs-1.3.0
          cd /tmp/docs-1.3.0
          mvn clean package -DskipTests
          mkdir -p $GITHUB_WORKSPACE/static/undertow-docs
          cp -r target/generated-docs $GITHUB_WORKSPACE/static/undertow-docs/undertow-docs-1.3.0
          cd $GITHUB_WORKSPACE/static/undertow-docs
          zip -r undertow-docs-1.3.0.zip undertow-docs-1.3.0

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy site from ${{ github.sha }}'
