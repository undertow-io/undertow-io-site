{{ define "main" }}
<div class="docs-wrapper">
    <!-- Sidebar -->
    <nav class="docs-sidebar">
        {{ partial "docs-nav.html" . }}
    </nav>

    <!-- Main content -->
    <main class="docs-content">
        <h1>{{ .Title }}</h1>
        {{ .Content }}

        {{ if .Pages }}
        <div class="mt-4">
            <h2>Pages in this section</h2>
            <ul>
                {{ range .Pages.ByWeight }}
                <li>
                    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                </li>
                {{ end }}
            </ul>
        </div>
        {{ end }}

        {{ partial "footer.html" . }}
    </main>
</div>
{{ end }}
