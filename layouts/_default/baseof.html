<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    <title>{{ if .Title }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link rel="stylesheet" type="text/css" href="{{ "stylesheets/code.css" | relURL }}">

    <!-- Highlight.js -->
    <script type="text/javascript" src="{{ "javascripts/highlight.pack.js" | relURL }}"></script>
    <script type="text/javascript">hljs.initHighlightingOnLoad();</script>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ "images/undertow_icon_16px.png" | relURL }}">

    <style>
        body {
            padding-top: 70px;
        }
        @media (min-width: 651px) {
            .banner {
                background-image: url({{ "images/undertow_banner.png" | relURL }});
                background-repeat: no-repeat;
                background-position: center;
                height: 110px;
            }
        }
        @media (max-width: 650px) {
            .banner {
                background-image: url({{ "images/undertow_logo-stacked_600px.png" | relURL }});
                background-repeat: no-repeat;
                background-position: center;
                background-size: contain;
                width: 200px;
                margin: 0 auto;
                height: 60px;
            }
        }
        .redhat-tab {
            position: fixed;
            top: 0;
            right: 100px;
            z-index: 1031;
        }
        .redhat-tab a {
            background-color: #cc0000;
            color: white;
            padding: 5px 15px;
            text-decoration: none;
            font-size: 12px;
        }
        .redhat-tab a:hover {
            background-color: #990000;
            color: white;
        }
        footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            border-top: 1px solid #e5e5e5;
        }
        .redhat-logo {
            margin-top: 20px;
        }
        .redhat-logo img {
            height: 40px;
        }
    </style>
    {{- block "head" . }}{{- end }}
</head>
<body>
    {{ partial "header.html" . }}

    <div class="container">
        <div class="redhat-tab">
            <a href="https://www.redhat.com">Red Hat</a>
        </div>

        <div class="banner"></div>

        {{- block "main" . }}{{- end }}

        {{ partial "footer.html" . }}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Google Analytics -->
    <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', 'UA-61374382-1', 'auto');
        ga('send', 'pageview');
    </script>
</body>
</html>
